services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    # Connect to your Mac's MySQL if it's not in Docker
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      # This tells the React app to send requests to your machine's port 8000
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend